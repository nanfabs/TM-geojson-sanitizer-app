<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoJSON Sanitizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
    }
    pre {
      background: #f6f6f6;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>GeoJSON Sanitizer</h1>
  <div class="card">
    <p>Upload a GeoJSON file to sanitize it.</p>
    <input id="fileInput" type="file" accept=".json,.geojson,application/geo+json,application/json">
    <button id="uploadBtn">Sanitize</button>
    <p id="status"></p>
  </div>

  <h2>Result</h2>
  <pre id="output">No result yet.</pre>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) {
        statusEl.textContent = "Please choose a file first.";
        return;
      }

      statusEl.textContent = "Uploading...";
      outputEl.textContent = "Working...";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch("/api/sanitize", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          outputEl.textContent = JSON.stringify(data, null, 2);
          statusEl.textContent = "Request failed.";
          return;
        }

        outputEl.textContent = JSON.stringify(data, null, 2);
        statusEl.textContent = "Done.";
      } catch (err) {
        outputEl.textContent = String(err);
        statusEl.textContent = "Upload failed.";
      }
    });
  </script>
</body>
</html>
